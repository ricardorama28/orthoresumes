<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 760" width="900" height="760" font-family="Calibri, Arial, sans-serif">
  <defs>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#b91c1c"/>
    </marker>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#0369a1"/>
    </marker>
  </defs>

  <!-- fondo y borde de acento del módulo MSA -->
  <rect x="0" y="0" width="900" height="760" fill="#ffffff"/>
  <rect x="10" y="10" width="880" height="740" fill="none" stroke="#38BDF8" stroke-width="3" rx="8"/>

  <!-- Título -->
  <text x="450" y="42" text-anchor="middle" font-size="21" font-weight="bold" fill="#0369a1">VASCULARIZACIÓN DE LA CABEZA HUMERAL Y PREDICTORES DE HERTEL (2004)</text>
  <text x="450" y="65" text-anchor="middle" font-size="13" fill="#475569">Dos puertas vasculares — anterior (rama ascendente / arteria arcuata) y posteromedial (calcar) — explican por qué la fractura-luxación desvasculariza la cabeza</text>

  <!-- ===================== HÚMERO PROXIMAL (vista anterior esquemática) ===================== -->

  <!-- diáfisis -->
  <rect x="385" y="390" width="90" height="270" rx="8" fill="#f1f5f9" stroke="#64748b" stroke-width="2.5"/>
  <text x="600" y="560" font-size="13" fill="#334155" text-anchor="start">DIÁFISIS</text>
  <line x1="475" y1="540" x2="595" y2="558" stroke="#94a3b8" stroke-width="1.3"/>

  <!-- metáfisis (ensanchamiento proximal) -->
  <polygon points="385,390 475,390 502,305 358,305" fill="#f1f5f9" stroke="#64748b" stroke-width="2.5"/>

  <!-- línea de cuello quirúrgico -->
  <line x1="345" y1="390" x2="515" y2="390" stroke="#dc2626" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="600" y="393" font-size="13" fill="#7f1d1d" text-anchor="start">CUELLO QUIRÚRGICO</text>
  <line x1="515" y1="390" x2="595" y2="391" stroke="#94a3b8" stroke-width="1.3"/>

  <!-- línea de cuello anatómico (curva) -->
  <path d="M358,278 Q430,258 520,285" fill="none" stroke="#7c2d12" stroke-width="2" stroke-dasharray="5 4"/>
  <text x="600" y="270" font-size="13" fill="#7c2d12" text-anchor="start">CUELLO ANATÓMICO</text>
  <line x1="520" y1="283" x2="595" y2="272" stroke="#94a3b8" stroke-width="1.3"/>

  <!-- cabeza humeral (segmento articular) -->
  <ellipse cx="430" cy="222" rx="96" ry="68" fill="#fde68a" stroke="#92400e" stroke-width="2.5"/>
  <text x="430" y="200" text-anchor="middle" font-size="13" font-weight="bold" fill="#78350f">CABEZA HUMERAL</text>
  <text x="430" y="216" text-anchor="middle" font-size="11.5" fill="#78350f">(segmento articular)</text>

  <!-- troquíter -->
  <ellipse cx="512" cy="278" rx="40" ry="48" fill="#fde68a" stroke="#92400e" stroke-width="2.5"/>
  <text x="608" y="255" font-size="13" fill="#78350f" text-anchor="start">TROQUÍTER</text>
  <line x1="545" y1="258" x2="605" y2="253" stroke="#94a3b8" stroke-width="1.3"/>

  <!-- surco bicipital -->
  <rect x="468" y="235" width="16" height="150" fill="#e2e8f0" stroke="#64748b" stroke-width="1.3"/>
  <text x="608" y="330" font-size="12.5" fill="#334155" text-anchor="start">SURCO BICIPITAL</text>
  <text x="608" y="346" font-size="11" fill="#475569" text-anchor="start">(tendón de la porción larga del bíceps)</text>
  <line x1="484" y1="330" x2="605" y2="332" stroke="#94a3b8" stroke-width="1.3"/>

  <!-- troquín -->
  <ellipse cx="374" cy="288" rx="27" ry="36" fill="#fde68a" stroke="#92400e" stroke-width="2.5"/>
  <text x="130" y="260" font-size="13" fill="#78350f" text-anchor="start">TROQUÍN</text>
  <line x1="130" y1="255" x2="350" y2="280" stroke="#94a3b8" stroke-width="1.3"/>

  <!-- calcar / cortical posteromedial (zona destacada) -->
  <path d="M358,305 C346,325 340,345 344,368 L370,368 C368,345 372,325 378,308 Z" fill="#fecaca" fill-opacity="0.55" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="3 2"/>
  <text x="60" y="345" font-size="13" font-weight="bold" fill="#7f1d1d" text-anchor="start">CALCAR</text>
  <text x="60" y="361" font-size="11" fill="#7f1d1d" text-anchor="start">(cortical posteromedial)</text>
  <line x1="130" y1="352" x2="352" y2="345" stroke="#94a3b8" stroke-width="1.3"/>

  <!-- ===================== VASOS ===================== -->

  <!-- tronco de la arteria axilar -->
  <path d="M210,690 C250,650 270,610 295,560" fill="none" stroke="#b91c1c" stroke-width="6" stroke-linecap="round"/>
  <text x="140" y="705" font-size="13" font-weight="bold" fill="#7f1d1d">A. AXILAR</text>
  <text x="140" y="720" font-size="11" fill="#7f1d1d">(3.ª porción)</text>

  <!-- circunfleja humeral anterior: cruza el cuello quirúrgico y sube por el surco -->
  <path d="M295,560 C340,520 390,470 430,420 C450,400 465,380 474,340" fill="none" stroke="#dc2626" stroke-width="4.5" marker-end="url(#arrowRed)"/>
  <text x="240" y="500" font-size="12.5" fill="#7f1d1d" font-weight="bold">A. CIRCUNFLEJA</text>
  <text x="240" y="514" font-size="12.5" fill="#7f1d1d" font-weight="bold">HUMERAL ANTERIOR</text>

  <!-- rama ascendente -> arteria arcuata (intraósea, discontinua dentro del hueso) -->
  <path d="M474,340 C476,300 478,260 468,225" fill="none" stroke="#dc2626" stroke-width="3.5" stroke-dasharray="2 4" marker-end="url(#arrowRed)"/>
  <text x="612" y="190" font-size="12.5" fill="#7f1d1d" font-weight="bold" text-anchor="start">A. ARCUATA (intraósea)</text>
  <text x="612" y="206" font-size="11" fill="#7f1d1d" text-anchor="start">doctrina histórica —</text>
  <text x="612" y="220" font-size="11" fill="#7f1d1d" text-anchor="start">rama ascendente de la</text>
  <text x="612" y="234" font-size="11" fill="#7f1d1d" text-anchor="start">circunfleja anterior</text>
  <line x1="468" y1="222" x2="608" y2="200" stroke="#94a3b8" stroke-width="1.3"/>

  <!-- circunfleja humeral posterior: aporte dominante, entra por posteromedial/calcar (trazo discontinuo = pasa por detrás) -->
  <path d="M295,560 C260,510 250,450 270,400 C290,360 320,335 358,315" fill="none" stroke="#7f1d1d" stroke-width="5.5" stroke-dasharray="9 5" marker-end="url(#arrowRed)"/>
  <text x="20" y="440" font-size="12.5" fill="#7f1d1d" font-weight="bold" text-anchor="start">A. CIRCUNFLEJA HUMERAL</text>
  <text x="20" y="456" font-size="12.5" fill="#7f1d1d" font-weight="bold" text-anchor="start">POSTERIOR</text>
  <text x="20" y="472" font-size="11.5" fill="#7f1d1d" text-anchor="start">aporte DOMINANTE según</text>
  <text x="20" y="486" font-size="11.5" fill="#7f1d1d" text-anchor="start">perfusión cuantitativa [VERIFICAR]</text>
  <text x="20" y="500" font-size="11.5" fill="#7f1d1d" text-anchor="start">— entra por el calcar —</text>

  <!-- ===================== CALLOUTS DE HERTEL (color de acento del módulo) ===================== -->

  <!-- bracket: extensión metafisaria posteromedial < 8 mm -->
  <line x1="330" y1="300" x2="330" y2="368" stroke="#0369a1" stroke-width="2" marker-start="url(#arrowBlue)" marker-end="url(#arrowBlue)"/>
  <rect x="600" y="420" width="270" height="58" fill="#e0f2fe" stroke="#0369a1" stroke-width="1.5" rx="6"/>
  <text x="612" y="438" font-size="12.5" font-weight="bold" fill="#0c4a6e">Extensión metafisaria posteromedial</text>
  <text x="612" y="453" font-size="12.5" font-weight="bold" fill="#0c4a6e">MENOR DE 8 mm = predictor de isquemia</text>
  <text x="612" y="468" font-size="11" fill="#0c4a6e">(1.er predictor de Hertel, 2004)</text>
  <line x1="332" y1="334" x2="598" y2="448" stroke="#0369a1" stroke-width="1.3" stroke-dasharray="3 2"/>

  <!-- bisagra medial -->
  <circle cx="352" cy="372" r="9" fill="#fde68a" stroke="#0369a1" stroke-width="2.5"/>
  <rect x="600" y="490" width="270" height="58" fill="#e0f2fe" stroke="#0369a1" stroke-width="1.5" rx="6"/>
  <text x="612" y="508" font-size="12.5" font-weight="bold" fill="#0c4a6e">Bisagra medial — desplazamiento</text>
  <text x="612" y="523" font-size="12.5" font-weight="bold" fill="#0c4a6e">MAYOR DE 2 mm = bisagra ROTA</text>
  <text x="612" y="538" font-size="11" fill="#0c4a6e">(2.º predictor de Hertel, 2004)</text>
  <line x1="360" y1="374" x2="598" y2="519" stroke="#0369a1" stroke-width="1.3" stroke-dasharray="3 2"/>

  <!-- tercer predictor: trazo de cuello anatómico -->
  <rect x="600" y="560" width="270" height="58" fill="#e0f2fe" stroke="#0369a1" stroke-width="1.5" rx="6"/>
  <text x="612" y="578" font-size="12.5" font-weight="bold" fill="#0c4a6e">Trazo de CUELLO ANATÓMICO</text>
  <text x="612" y="593" font-size="12.5" font-weight="bold" fill="#0c4a6e">= 3.er predictor de Hertel (2004)</text>
  <text x="612" y="608" font-size="11" fill="#0c4a6e">Los 3 combinados: VPP ≈ 97% [VERIFICAR]</text>
  <line x1="520" y1="283" x2="598" y2="589" stroke="#0369a1" stroke-width="1.3" stroke-dasharray="3 2"/>

  <!-- ===================== LEYENDA ===================== -->
  <rect x="30" y="600" width="330" height="120" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.3" rx="6"/>
  <text x="45" y="620" font-size="12.5" font-weight="bold" fill="#334155">LEYENDA</text>
  <line x1="45" y1="636" x2="85" y2="636" stroke="#dc2626" stroke-width="4.5"/>
  <text x="93" y="640" font-size="11.5" fill="#334155">Circunfleja anterior → arcuata (aporte clásico)</text>
  <line x1="45" y1="656" x2="85" y2="656" stroke="#7f1d1d" stroke-width="5.5" stroke-dasharray="9 5"/>
  <text x="93" y="660" font-size="11.5" fill="#334155">Circunfleja posterior (aporte DOMINANTE)</text>
  <rect x="45" y="670" width="14" height="14" fill="#fecaca" fill-opacity="0.55" stroke="#dc2626" stroke-width="1.3" stroke-dasharray="3 2"/>
  <text x="93" y="682" font-size="11.5" fill="#334155">Calcar (cortical posteromedial)</text>
  <line x1="45" y1="700" x2="85" y2="700" stroke="#0369a1" stroke-width="2"/>
  <text x="93" y="704" font-size="11.5" fill="#334155">Medición / predictor de Hertel (2004)</text>

  <!-- ===================== PIE ===================== -->
  <text x="450" y="738" text-anchor="middle" font-size="12" font-style="italic" fill="#334155">Muestra las dos puertas vasculares de la cabeza humeral y cómo de esa anatomía se deducen los tres predictores de isquemia de Hertel (2004): extensión</text>
  <text x="450" y="753" text-anchor="middle" font-size="12" font-style="italic" fill="#334155">metafisaria posteromedial &lt; 8 mm, bisagra medial rota (&gt; 2 mm) y trazo de cuello anatómico. El aporte dominante de la circunfleja posterior está marcado [VERIFICAR].</text>
</svg>
