nota: Derivado de la hoja ORDEN DE GENERACION del Indice Maestro 2026. /siguiente elige dentro de fase_activa.
fases:
  0:
    nombre: Cerrar series abiertas
    criterio: Ya iniciadas; no dejar series a medio camino.
  1:
    nombre: GEN canonicos de alto rendimiento
    criterio: Son los que se preguntan siempre y los que alimentan por remision a todos los demas modulos.
  2:
    nombre: MIA completo
    criterio: Modulo de guardia. Maximo rendimiento clinico y de examen.
  3:
    nombre: COL completo
    criterio: Mayor brecha entre lo que existe y lo que se exige.
  4:
    nombre: MIC y MSC
    criterio: Volumen alto pero menor densidad quirurgica por documento.
  5:
    nombre: ART completo
    criterio: Modulo nuevo. Alta rentabilidad en oral y ateneo.
  6:
    nombre: GEN restante
    criterio: Completa el bloque de generalidades.
  7:
    nombre: TUM y TUMI restantes
    criterio: Serie ya estructurada, avanza sola.
  8:
    nombre: PED completo
    criterio: Requiere incorporar antes Rockwood & Wilkins 10a y Tachdjian 6a a la biblioteca.
